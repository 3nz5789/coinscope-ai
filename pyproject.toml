[project]
name = "coinscopeai-market-data"
version = "0.1.0"
description = "CoinScopeAI Phase 1 — Multi-exchange WebSocket price stream infrastructure"
requires-python = ">=3.10"
dependencies = [
    "websockets>=12.0",
    "aiohttp>=3.9",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
