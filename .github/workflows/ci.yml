name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-22.04
    env:
      APP_ENV: TEST
      BINANCE_TESTNET: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install test dependencies
        run: python3 -m pip install --upgrade pip pytest pytest-asyncio
      - name: Run smoke tests
        run: python3 -m pytest tests/test_ci_smoke.py -v --tb=long -W ignore::pytest.PytestConfigWarning

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install lint dependencies
        run: pip install ruff
      - name: ruff check
        run: ruff check . --output-format=github

  evidence-gate:
    name: Evidence Gate
    runs-on: ubuntu-22.04
    # PR-only. Pushes to main can't add evidence retroactively.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check exemption label
        id: exempt
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"evidence-gate-exempt"'; then
            echo "exempt=true" >> "$GITHUB_OUTPUT"
            echo "evidence-gate: PR carries 'evidence-gate-exempt' label — gate skipped."
            echo "evidence-gate: this is auditable in the PR's label history."
          else
            echo "exempt=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run evidence gate
        if: steps.exempt.outputs.exempt != 'true'
        run: |
          python3 scripts/evidence_gate.py --base "origin/${{ github.base_ref }}"

  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed .env files
        run: |
          if git ls-files | grep -qE '^\.env$|^\.env\.(production|local|staging)$'; then
            echo "ERROR: .env file committed!"
            exit 1
          fi
          echo "No .env files tracked. OK"
      - name: Check for hardcoded API keys
        run: |
          found=$(grep -rl "BINANCE_API_KEY=[A-Za-z0-9]\{20,\}" \
            --include="*.py" --include="*.yml" . 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "ERROR: Possible hardcoded key in: $found"
            exit 1
          fi
          echo "No hardcoded API keys. OK"
      - name: Check for stale risk thresholds
        run: |
          if python3 scripts/risk_threshold_guardrail.py 2>/dev/null; then
            echo "Threshold guardrail clean. OK"
          else
            echo "WARNING: Threshold guardrail not available in CI (VPS-dependent checks skipped)"
          fi

