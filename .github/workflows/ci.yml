name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: TEST
      BINANCE_TESTNET: "true"
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - name: Run tests
        run: pytest -x -q --cov=coinscope_trading_engine --cov-report=term-missing

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed .env files
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.(production|local|staging)$'; then
            echo "ERROR: .env file committed to repository!"
            exit 1
          fi
          echo "No .env files tracked. OK"
      - name: Check for hardcoded API keys
        run: |
          if grep -rn "BINANCE_API_KEY=[A-Za-z0-9]\{20,\}" --include="*.py" --include="*.yml" --include="*.yaml" . 2>/dev/null; then
            echo "ERROR: Possible hardcoded API key detected!"
            exit 1
          fi
          echo "No hardcoded API keys found. OK"
