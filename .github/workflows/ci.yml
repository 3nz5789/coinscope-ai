name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Lint (best-effort, non-blocking)
        run: |
          ruff check . --ignore E501,F401,F811,E402 \
            --exclude "*.html,*.md,*.txt,*.yml,*.yaml" \
            2>&1 | head -50 || true
          echo "Lint step complete"

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      APP_ENV: TEST
      BINANCE_TESTNET: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install pytest
      - name: Run smoke tests
        run: pytest tests/test_ci_smoke.py -v --tb=short

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed .env files
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.(production|local|staging)$'; then
            echo "ERROR: .env file committed!"
            exit 1
          fi
          echo "No .env files tracked. OK"
      - name: Check for hardcoded API keys
        run: |
          if grep -rn "BINANCE_API_KEY=[A-Za-z0-9]\{20,\}" \
            --include="*.py" --include="*.yml" --include="*.yaml" . 2>/dev/null; then
            echo "ERROR: Possible hardcoded API key!"
            exit 1
          fi
          echo "No hardcoded API keys. OK"
      - name: Check for live Stripe keys
        run: |
          if grep -rn "sk_live_\|pk_live_" \
            --include="*.py" --include="*.yml" --include="*.yaml" . 2>/dev/null; then
            echo "ERROR: Possible live Stripe key!"
            exit 1
          fi
          echo "No live Stripe keys. OK"
