name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-22.04
    env:
      APP_ENV: TEST
      BINANCE_TESTNET: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python3 -m pip install --upgrade pip pytest
      - name: Run smoke tests
        run: python3 -m pytest tests/test_ci_smoke.py -v --tb=long

  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for committed .env files
        run: |
          if git ls-files | grep -qE '^\.env$|^\.env\.(production|local|staging)$'; then
            echo "ERROR: .env file committed!"
            exit 1
          fi
          echo "No .env files tracked. OK"
      - name: Check for hardcoded API keys
        run: |
          found=$(grep -rl "BINANCE_API_KEY=[A-Za-z0-9]\{20,\}" \
            --include="*.py" --include="*.yml" . 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "ERROR: Possible hardcoded key in: $found"
            exit 1
          fi
          echo "No hardcoded API keys. OK"
