# ─────────────────────────────────────────────────────────────
#  CoinScopeAI — Staging Environment Configuration
# ─────────────────────────────────────────────────────────────

app:
  name: coinscopeai
  environment: staging
  debug: false
  log_level: INFO

engine:
  host: 0.0.0.0
  port: 8001
  testnet_mode: true
  initial_capital: 10000

risk_gate:
  max_daily_loss_pct: 0.03
  max_consecutive_losses: 5
  max_drawdown_pct: 0.10
  max_open_positions: 3

database:
  host: ${DB_HOST}
  port: 5432
  name: coinscopeai_staging
  pool_size: 10

redis:
  host: ${REDIS_HOST}
  port: 6379
  db: 0
