# ---- PASS 2: verification gate applied ----

tigers:
  - risk: "Freeze may block a critical risk-threshold change if discovered mid-validation"
    location: "business-plan/master-prompt-v2.md (no emergency clause)"
    severity: high
    category: risk
    mitigation_checked: "No emergency exception clause defined for risk thresholds; no escalation path; no named override authority. If a real risk surfaces (e.g., need to drop max_open_positions from 5 to 3 mid-validation for safety), the freeze policy as drafted has no relief valve."
    suggested_fix: "Add explicit carve-out: risk-threshold tightening (more conservative direction) is exempt from freeze; risk-threshold loosening is blocked. Document override path."

  - risk: "Queue mechanism (_proposed/) doesn't exist yet"
    location: "business-plan/_proposed/ (folder absent)"
    severity: medium
    category: process
    mitigation_checked: "_proposed/ folder doesn't exist; no template for queued changes; no review cadence; no owner named."
    suggested_fix: "Create _proposed/ with a queue template before announcing freeze. Mirror the _premortems/ + _handoffs/ pattern - one YAML per proposed change, dated, with rationale."

  - risk: "Framework changes during validation could invalidate cohort feedback"
    location: "framework sections 05/11/14/16 + master prompt"
    severity: medium
    category: data
    mitigation_checked: "No 'material change' definition exists; no governance doc for what triggers cohort reset; no version pin captured at cohort start."
    suggested_fix: "Snapshot framework + master prompt + .env at cohort start (git tag like cohort-p0-start-2026-05-XX). Define 'material change' as anything affecting personas, tier matrix, risk thresholds, gates, or phase definitions."

elephants:
  - risk: "40-cap cohort may not have actually started yet - we may be debating freeze for a window that hasn't opened"
    severity: medium
    suggested_fix: "Confirm cohort start date FIRST. If cohort hasn't started, freeze is premature - lock the framework AT cohort start instead of as a separate prior decision."

  - risk: "Freeze creates a 30-day window where framework feedback from doing the work cannot be incorporated - we lose the most valuable learning period"
    severity: medium
    suggested_fix: "Capture all 'would have changed' notes in _proposed/ during freeze; bulk-incorporate at validation close; treat the 30 days as a forced learning capture period."

paper_tigers:
  - risk: "Scoopy persona references 'currently in 30-day validation phase. No core engine changes' - does this also mean no framework changes?"
    location: "business-plan/master-prompt-v2.md (Environment rules section)"
    reason: "Phrase explicitly says 'No core engine changes' - it does NOT prohibit framework changes. The freeze under discussion would be a NEW policy on top of this, not an interpretation of existing language. Master prompt is unambiguous about scope."

  - risk: "Decision-log not updated for this freeze policy"
    location: "business-plan/_decisions/decision-log.md"
    reason: "By definition, the log entry happens when (and if) the freeze is decided. Pre-decision absence of the entry is not a tiger - it's the natural state."

false_alarms:
  - finding: "Without freeze, drift detector load increases"
    reason: "Drift detector is automated per project_state_2026-05-02 memory. Increased run frequency is not a real cost - the detector is the safety net, not a constraint."

  - finding: "Cowork project_instructions still has old master prompt"
    reason: "Out of scope. Separate deferred handoff (per project_deferred_handoffs memory). Related to overall freeze hygiene but not to the framework-freeze decision specifically."

