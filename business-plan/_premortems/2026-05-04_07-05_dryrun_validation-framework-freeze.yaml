# Pre-Mortem - Dry Run
# Question: should we freeze framework changes (sections 00-16) during the 30-day P0 validation window?
# Decision pending. This premortem surfaces tigers/elephants to inform the call.

# ---- PASS 1: pattern-match (raw findings) ----
potential_risks:
  - "Framework changes during validation could invalidate cohort feedback"
  - "Without freeze, drift detector load increases"
  - "Freeze may block a critical risk-threshold change if discovered mid-validation"
  - "Queue mechanism (_proposed/) doesn't exist yet"
  - "40-cap cohort may not have started yet - 'validation window' boundaries unclear"
  - "Decision-log not updated for this freeze policy"
  - "Cowork project_instructions still has old master prompt - separate freeze concern"
