---
session: "<short kebab-case name, e.g., validation-cohort-p0, leverage-cap-lock>"
date: YYYY-MM-DD
status: complete         # complete | partial | blocked
outcome: SUCCEEDED       # SUCCEEDED | PARTIAL_PLUS | PARTIAL_MINUS | FAILED
phase: P0                # P0 | P1 | P2 | P5
gate: G2                 # G1 | G2 | G3 | G4 (or N/A)
---

# Handoff (CoinScopeAI)
# Format: ~400 tokens YAML vs ~2000 markdown
# goal + now are first-class - articulate them tightly in one sentence each.

goal: "<what THIS session accomplished, one sentence, declarative>"
now: "<what NEXT session should do first, one sentence, imperative>"
test: "<command or check to verify this work, e.g., 'run drift detector against framework sections 5/11/14/16'>"

done_this_session:
  - task: "<task 1 description>"
    files: ["<file1>", "<file2>"]
  - task: "<task 2 description>"
    files: ["<file3>"]

blockers:
  - "<blocker if any, otherwise omit this key>"

questions:
  - "<unresolved question for next session>"

decisions:
  - decision_name: "<what was decided>"
    rationale: "<why>"
    log_entry: "<link to _decisions/decision-log.md entry if applicable>"

findings:
  - finding_name: "<key learning>"
    detail: "<details>"

worked:
  - "<approach that worked - repeat next time>"

failed:
  - "<approach that failed - avoid next time, with reason>"

next:
  - "<first next step, with explicit command or file path if known>"
  - "<second next step>"

files:
  created: ["<new files this session>"]
  modified: ["<changed files this session>"]
  deleted: ["<removed files this session>"]

memory_updates:
  - "<Cowork memory file written or updated this session>"

mempalace_writes:
  - "<MemPalace wing/hall entries created this session>"

related_premortems:
  - "<business-plan/_premortems/YYYY-MM-DD_HH-MM_topic.yaml>"

