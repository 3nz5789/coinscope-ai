# ─────────────────────────────────────────────────────────────
#  CoinScopeAI — Development Docker Compose
#  Usage: docker-compose -f infra/docker/docker-compose.dev.yml up -d
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: coinscopeai-db
    environment:
      POSTGRES_DB: coinscopeai_dev
      POSTGRES_USER: coinscopeai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coinscopeai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coinscopeai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
